name: Build Binaries

on:
  push:
    tags:
      - 'v*'  # triggers on version tags like v0.1.7

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build binary (Linux/Mac)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --onefile \
            --name paisa \
            --add-data "paisa:paisa" \
            paisa/cli.py

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile `
            --name paisa `
            --add-data "paisa;paisa" `
            paisa/cli.py

      - name: Rename binary for platform
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            mv dist/paisa.exe dist/paisa-windows.exe
          elif [ "${{ runner.os }}" == "macOS" ]; then
            mv dist/paisa dist/paisa-macos
          else
            mv dist/paisa dist/paisa-linux
          fi

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: paisa-${{ runner.os }}
          path: dist/paisa-*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
